<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>作業</title>
    <style>
        body {
            font-family: "Times New Roman", Times, serif; /* 襯線體符合圖片外觀 */
            padding: 50px;
            background-color: #f9f9f9;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 50px;
            border: 1px solid #ccc;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            width: 600px;
            display: flex;
            flex-direction: column;
            gap: 40px; /* 增加間距 */
        }

        /* 標題 1：偽元素製作線條，並同步文字陰影 */
        .h1-both-shadow {
            font-size: 42px;
            margin: 0;
            display: inline-block;
            padding-top: 20px; /* 留出空間給上方的線 */
            position: relative;
            /* 文字陰影 */
            text-shadow: 3px 3px 0px lightpink; 
        }

        .h1-both-shadow::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; /* 線條長度與文字一致 */
            height: 5px; /* 線條厚度 */
            background-color: black;
            /* 線條陰影 */
            box-shadow: 3px 3px 0px lightpink; 
        }

        h2 {
            font-style: italic;
            font-size: 32px;
            padding: 10px;
            margin: 0;
            border: 1px solid black; /* 內層細黑邊 */
            /* 利用多重陰影：第一層實心黃色(4px)，第二層模糊灰色(6px) */
            box-shadow: 
                0 0 0 4px #dede00, 
                5px 5px 6px rgba(0,0,0,0.3);
        }

        /* 標題 3：靠右對齊容器 */
        .h3-container {
            text-align: right;
        }

        h3 {
            font-size: 28px;
            margin: 0;
            display: inline-block;
            text-decoration: underline; /* 穩定的單底線 */
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div>
            <h1 class="h1-both-shadow">This is heading 1</h1>
        </div>

        <h2>This is heading 2</h2>

        <div class="h3-container">
            <h3>This is heading 3</h3>
        </div>
    </div>

</body>
</html>
